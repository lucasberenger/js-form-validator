<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Form Validator</title>
    <style>
        
        body {
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
            background-color: #f8f9fa; 
            font-family: Arial, sans-serif;
        }

        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            width: 100%; 
            box-sizing: border-box;
        }

        .error {
            display: block !important;
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .success {
            display: block !important;
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .field {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            width: 300px; 
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            width: 100%; 
        }

        button:hover {
            background-color: #0056b3;
        }

        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <form id="validatorForm">
            <div class="field">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="field">
                <label>Username:</label>
                <input type="text" id="username" required>
            </div>
            <div class="field">
                <label>Password:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Validar e Enviar</button>
        </form>

        <div id="message"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
